name: Backend CI/CD
on:
  push:
    branches:
      - main
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      # 1. 코드 체크아웃
      - name: Checkout code
        uses: actions/checkout@v3
      # 2. Java 21 설치
      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'corretto'
      # 3. application-secret.yml 생성
      - name: Create secret yml
        run: |
          mkdir -p src/main/resources
          cat > src/main/resources/application-secret.yml << EOF
          spring:
            datasource:
              url: jdbc:postgresql://syslab-rds.cb064i6coc46.ap-northeast-2.rds.amazonaws.com:5432/syslab
              username: postgres
              password: ${{ secrets.DB_PASSWORD }}
          aws:
            region: ap-northeast-2
            s3:
              bucket-code: syslab-code
              bucket-frontend: syslab-frontend
            sqs:
              url: https://sqs.ap-northeast-2.amazonaws.com/290373175858/syslab-grading-queue
            vm-ec2-host: http://10.0.1.19:2376
          auth:
            jwt:
              header: Authorization
              issuer: diveon
              secret: ${{ secrets.JWT_SECRET }}
              token-validity-in-seconds: 86400
          logging:
            level:
              org.springframework.web.servlet.DispatcherServlet: DEBUG
              org.springframework.web.servlet.mvc: DEBUG
              net.diveon.backend: DEBUG
          EOF
      # 4. Gradle 빌드
      - name: Build with Gradle
        run: |
          chmod +x gradlew
          ./gradlew build -x test
      # 5. AWS 인증
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}
      # 6. ECR 로그인
      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v1
      # 7. Docker 이미지 빌드 & ECR 푸시
      - name: Build and push Docker image
        run: |
          IMAGE_URI=${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:latest
          docker build -t $IMAGE_URI .
          docker push $IMAGE_URI
      # 8. API EC2에 SSH 접속 후 배포
      - name: Deploy to API EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_KEY }}
          script: |
            aws ecr get-login-password --region ap-northeast-2 | \
              docker login --username AWS --password-stdin \
              ${{ secrets.ECR_REGISTRY }}
            docker pull ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:latest
            docker stop syslab-backend || true
            docker rm syslab-backend || true
            docker run -d \
              --name syslab-backend \
              --restart always \
              -p 8080:8080 \
              ${{ secrets.ECR_REGISTRY }}/${{ secrets.ECR_REPOSITORY }}:latest
