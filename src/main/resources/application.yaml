spring:
  # 1. 프로파일 관리: 기본 실행은 local, 민감 정보는 항상 secret 포함
  profiles:
    active: local
    include: secret

  application:
    name: diveon

  # 2. Docker Compose Support 
  # 개발 및 테스트 시점에 컨테이너를 자동으로 관리
  docker:
    compose:
      enabled: true
      lifecycle-management: start_and_stop
      readiness:
        tcp:
          host: localhost

  # 3. 데이터소스 및 JPA 설정
  datasource:
    driver-class-name: org.postgresql.Driver
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  jpa:
    open-in-view: false
    show-sql: false
    hibernate:
      ddl-auto: none # 기본은 안전하게 none으로 설정
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  # 4. Redis 설정
  data:
    redis:
      host: ${SPRING_REDIS_HOST}
      port: ${SPRING_REDIS_PORT}
      # 필요 시 레디스 세션 저장소 활성화 (spring-session-data-redis 의존성 있을 경우)
      # session:
      #   store-type: redis


# ---------------------------------------------------------

# 5. 서버 및 웹소켓 공통 설정
server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true
  error:
    include-message: always # Validation 실패 메시지 노출을 위해 추가

# 6. 사용자 정의(Custom) 설정 - Configuration Properties 활용
# 민감한 키값은 변수로 처리하여 application-secret.yaml에서 실제 값을 주입받음

auth:
  jwt:
    header: Authorization
    issuer: diveon
    secret: ${JWT_SECRET_KEY}
    token-validity-in-seconds: 86400

# docker-java 라이브러리 직접 제어용 설정
# spring.docker와 이름이 겹치지 않게 'external-docker'로 명명
external-docker:
  api:
    host: ${DOCKER_HOST_ADDRESS:unix:///var/run/docker.sock}
    config-path: ${DOCKER_CONFIG_PATH}
    connection-timeout: 5000
    read-timeout: 30000 # 터미널 작업 시 타임아웃을 고려하여 넉넉히 설정