spring:
  profiles:
    active: local
    include: secret
  application:
    name: diveon
  data:
    redis:
      host: 172.17.0.1
      port: 6379
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

server:
  port: 8080
  servlet:
    encoding:
      charset: UTF-8
      force: true
  error:
    include-message: always
